<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSAT Verbal Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4ff;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#f8faff;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding:20px 18px 80px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e5e7eb;display:flex;height:62px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.nav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#9ca3af;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;transition:color .15s}
.nav-btn.active{color:#3b82f6}
.nav-btn .ni{font-size:20px;line-height:1}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px}
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1e3a8a;color:#fff;width:100%}
.btn-secondary{background:#e5e7eb;color:#374151;width:100%}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800}
.progress-bar{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .5s}
h1{font-size:24px;font-weight:900;color:#0f2545;margin-bottom:4px}
h2{font-size:18px;font-weight:800;color:#0f2545}
.muted{color:#6b7280;font-size:13px}
.chip{background:#dbeafe;color:#1d4ed8;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;display:inline-block;margin:2px}
.answer-btn{width:100%;text-align:left;background:#fff;border:2px solid #e5e7eb;border-radius:13px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:#374151;cursor:pointer;margin-bottom:7px;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:10px}
.answer-btn:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff}
.answer-btn.correct{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.answer-btn.wrong{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.choice-letter{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;background:#f3f4f6;color:#6b7280}
.answer-btn.correct .choice-letter{background:#6ee7b7;color:#065f46}
.answer-btn.wrong .choice-letter{background:#fca5a5;color:#991b1b}
.answer-btn:hover:not(:disabled) .choice-letter{background:#bfdbfe;color:#1e40af}
.flash-card{background:#fff;border-radius:22px;padding:30px 24px;min-height:200px;display:flex;flex-direction:column;justify-content:center;text-align:center;cursor:pointer;border:2px solid #e5e7eb;box-shadow:0 4px 18px rgba(0,0,0,.09);transition:box-shadow .2s;margin-bottom:16px}
.flash-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.13)}
.rate-row{display:flex;gap:8px;margin-top:8px}
.rate-btn{flex:1;border:none;border-radius:11px;padding:12px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-box{background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-val{font-size:22px;font-weight:900;color:#0f2545}
.stat-lbl{font-size:11px;color:#9ca3af;margin-top:2px}
.quick-btn{background:#fff;border:2px solid;border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;width:100%;text-align:left;transition:transform .1s}
.quick-btn:hover{transform:translateY(-1px)}
.root-item{background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:border-color .15s}
.root-item:hover{border-color:#93c5fd}
.done-screen{text-align:center;padding:40px 20px}
.result-row{display:flex;justify-content:space-between;background:#f9fafb;border-radius:10px;padding:10px 14px;margin-bottom:6px}
.analogy-stem{background:#0f2545;border-radius:18px;padding:20px 22px;margin:12px 0;color:#fff;line-height:1.6}
.stem-text{font-size:18px;font-weight:800;line-height:1.5}
.blank{color:#fbbf24;font-style:italic}
.input-field{width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:#374151;outline:none;margin-bottom:10px;transition:border-color .15s}
.input-field:focus{border-color:#93c5fd}
.word-list-item{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tab-row{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;border:2px solid #e5e7eb;border-radius:10px;padding:8px 6px;background:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#6b7280;text-align:center}
.tab.active{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.type-chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;background:#ede9fe;color:#6d28d9;margin-bottom:10px}
</style>
</head>

nd actively seeking social company",pos:"adj",ex:"The gregarious puppy ran up to every person at the park.",root:"greg- (flock)",lvl:3},{id:14,w:"Loquacious",d:"Tending to talk a great deal; very talkative",pos:"adj",ex:"The loquacious host narrated every single photo in the album.",root:"loqu- (speak)",lvl:3},{id:15,w:"Serene",d:"Calm, peaceful, and untroubled",pos:"adj",ex:"The lake was completely serene before sunrise.",root:null,lvl:1},{id:16,w:"Trepidation",d:"A feeling of fear or anxiety about something",pos:"noun",ex:"She felt trepidation before her first solo performance.",root:null,lvl:2},{id:17,w:"Acumen",d:"Keen judgment and insight in a particular area",pos:"noun",ex:"Her business acumen helped the team double its sales.",root:null,lvl:3},{id:18,w:"Wistful",d:"Having a longing for something past or absent",pos:"adj",ex:"He gave a wistful smile remembering childhood summers.",root:null,lvl:2},{id:19,w:"Ubiquitous",d:"Appearing or found everywhere at the same time",pos:"adj",ex:"Smartphones have become ubiquitous in modern life.",root:null,lvl:3},{id:20,w:"Frugal",d:"Careful with money and resources; thrifty",pos:"adj",ex:"Her frugal habits meant she always had savings.",root:null,lvl:1},{id:21,w:"Haughty",d:"Arrogantly superior and disdainful toward others",pos:"adj",ex:"The haughty princess refused to speak to the servants.",root:null,lvl:2},{id:22,w:"Candid",d:"Truthful and straightforward; frank and honest",pos:"adj",ex:"She gave a candid answer even though the truth stung.",root:null,lvl:1},{id:23,w:"Eminent",d:"Famous and respected in a particular field",pos:"adj",ex:"The eminent scientist had already won three Nobel Prizes.",root:null,lvl:2},{id:24,w:"Didactic",d:"Intended to teach a lesson; overly instructive",pos:"adj",ex:"Aesop's fables are didactic stories designed to teach morals.",root:null,lvl:3},{id:25,w:"Languid",d:"Weak or slow in movement; lacking energy",pos:"adj",ex:"The languid summer afternoon made everyone drowsy.",root:null,lvl:2},{ e made a judicious decision to wait before speaking.",root:null,lvl:3},{id:51,w:"Adamant",d:"Refusing to be persuaded; firmly decided",pos:"adj",ex:"She was adamant that she would not change her answer.",root:null,lvl:2},{id:52,w:"Adept",d:"Very skilled or proficient at something",pos:"adj",ex:"He was adept at solving even the hardest math puzzles.",root:null,lvl:1},{id:53,w:"Affable",d:"Friendly, good-natured, and easy to talk to",pos:"adj",ex:"The affable librarian helped every student with a smile.",root:null,lvl:2},{id:54,w:"Alacrity",d:"Brisk and cheerful readiness to do something",pos:"noun",ex:"She accepted the challenge with great alacrity.",root:null,lvl:3},{id:55,w:"Aloof",d:"Not friendly or forthcoming; cool and distant",pos:"adj",ex:"The new student seemed aloof, but she was just shy.",root:null,lvl:2},{id:56,w:"Altruistic",d:"Showing unselfish concern for the well-being of others",pos:"adj",ex:"Her altruistic decision to donate her prize money inspired everyone.",root:null,lvl:3},{id:57,w:"Amicable",d:"Having a friendly and pleasant manner",pos:"adj",ex:"Despite their disagreement, the two teams reached an amicable solution.",root:null,lvl:2},{id:58,w:"Apathy",d:"Lack of interest, enthusiasm, or concern",pos:"noun",ex:"His apathy toward the election surprised his politically active friends.",root:"path- (feeling)",lvl:2},{id:59,w:"Appease",d:"To make someone calmer by giving what they want",pos:"verb",ex:"The teacher tried to appease the upset student with extra time.",root:null,lvl:2},{id:60,w:"Arrogant",d:"Having an exaggerated sense of one's own importance",pos:"adj",ex:"The arrogant champion refused to congratulate the runner-up.",root:null,lvl:1},{id:61,w:"Articulate",d:"Having the ability to speak fluently and clearly",pos:"adj",ex:"The articulate student explained her idea without any hesitation.",root:null,lvl:1},{id:62,w:"Astute",d:"Very clever; showing an ability to accurately assess situations",pos:"adj",ex:"The astute detective noticed the clue that everyone else missed.",root:null,lvl:2},{id:63,w:"Audacious",d:"Showing a willingness to take surprisingly bold risks",pos:"adj",ex:"It was audacious to challenge the champion in her first match.",root:"aud- (dare)",lvl:2},{id:64,w:"Austere",d:"Severe in manner; plain and simple without luxury",pos:"adj",ex:"The austere classroom had only desks, a board, and one window.",root:null,lvl:3},{id:65,w:"Banal",d:"So common as to be lacking interest; predictable",pos:"adj",ex:"The movie had a banal plot that everyone could predict.",root:null,lvl:3},{id:66,w:"Belligerent",d:"Hostile and aggressive; eager to argue or fight",pos:"adj",ex:"The belligerent player was removed from the game for arguing.",root:null,lvl:2},{id:67,w:"Blithe",d:"Showing a casual, cheerful indifference",pos:"adj",ex:"She gave a blithe shrug, as if the problem didn't matter.",root:null,lvl:3},{id:68,w:"Boisterous",d:"Noisy, energetic, and cheerful",pos:"adj",ex:"The boisterous crowd erupted when the band took the stage.",root:null,lvl:1},{id:69,w:"Boorish",d:"Rough and bad-mannered; unpleasant to be around",pos:"adj",ex:"His boorish behavior at the dinner embarrassed his family.",root:null,lvl:3},{id:70,w:"Brevity",d:"Concise and exact use of words in writing or speech",pos:"noun",ex:"The coach admired her brevity — she said exactly what was needed.",root:"brev- (short)",lvl:2},{id:71,w:"Callous",d:"Showing an insensitive disregard for others",pos:"adj",ex:"The callous remark brought tears to her younger sister's eyes.",root:null,lvl:2},{id:72,w:"Clamor",d:"A loud and confused noise; to make such a noise",pos:"noun",ex:"The clamor of the cafeteria made it hard to think.",root:null,lvl:1},{id:73,w:"Clemency",d:"Mercy and leniency shown toward an offender",pos:"noun",ex:"The judge showed clemency and reduced the boy's punishment.",root:null,lvl:3},{id:74,w:"Coerce",d:"To persuade someone to do something using force or threats",pos:"verb",ex:"No one should coerce a student into changing their answer.",root:null,lvl:2},{id:75,w:"Cogent",d:"Clear, logical, and convincing",pos:"adj",ex:"Her cogent argument convinced even the most skeptical judges.",root:null,lvl:3},{id:76,w:"Complacent",d:"Showing uncritical satisfaction with oneself",pos:"adj",ex:"The complacent team stopped practicing and quickly lost the championship.",root:null,lvl:2},{id:77,w:"Concise",d:"Giving a lot of information clearly in few words",pos:"adj",ex:"A good essay title should be concise and descriptive.",root:null,lvl:1},{id:78,w:"Condescending",d:"Acting as though others are inferior; patronizing",pos:"adj",ex:"Her condescending tone made her teammates feel disrespected.",root:null,lvl:2},{id:79,w:"Convoluted",d:"Extremely complex and difficult to follow",pos:"adj",ex:"The convoluted instructions made the simple game impossible to start.",root:null,lvl:3},{id:80,w:"Copious",d:"Abundant in supply; more than enough",pos:"adj",ex:"She took copious notes and never missed a single detail.",root:null,lvl:2},{id:81,w:"Credulous",d:"Too ready to believe things; easily fooled",pos:"adj",ex:"The credulous child believed every tall tale his brother told.",root:null,lvl:3},{id:82,w:"Cryptic",d:"Having a meaning that is mysterious or hard to understand",pos:"adj",ex:"She left a cryptic note that none of her friends could decode.",root:"crypt- (hidden)",lvl:2},{id:83,w:"Cunning",d:"Having skill in achieving goals in clever or sly ways",pos:"adj",ex:"The cunning fox tricked the other animals in every fable.",root:null,lvl:1},{id:84,w:"Cynical",d:"Believing that people are motivated only by self-interest",pos:"adj",ex:"A cynical reader doubts that any character acts from pure kindness.",root:null,lvl:2},{id:85,w:"Decorum",d:"Behavior expected in polite society; proper conduct",pos:"noun",ex:"The principal reminded students that decorum was expected at assembly.",root:null,lvl:3},{id:86,w:"Deferential",d:"Showing great respect by submitting to others' wishes",pos:"adj",ex:"The new student was deferenti {id:72,stem:"Breeze is to hurricane as",ch:[["drizzle","cloud"],["drizzle","weather"],["drizzle","umbrella"],["drizzle","downpour"],["drizzle","wet"]],ans:3,type:"Degree",tip:"A hurricane is an extreme form of a breeze; a downpour is an extreme form of a drizzle."},
{id:73,stem:"Scratch is to wound as",ch:[["mistake","disaster"],["cut","bleed"],["hurt","injury"],["pain","scar"],["bruise","fall"]],ans:0,type:"Degree",tip:"A wound is far more serious than a scratch; a disaster is far more serious than a mistake."},
{id:74,stem:"Yawn is to sleepy as",ch:[["fidget","bored"],["fidget","restless"],["fidget","nervous"],["fidget","active"],["fidget","distracted"]],ans:1,type:"Degree",tip:"A yawn is a physical sign of sleepiness; fidgeting is a physical sign of restlessness."},
{id:75,stem:"Worried is to panicked as",ch:[["sad","cheerful"],["annoyed","furious"],["happy","joyful"],["tired","weary"],["scared","nervous"]],ans:1,type:"Degree",tip:"Panicked is an extreme form of worried; furious is an extreme form of annoyed."},
{id:76,stem:"Rain is to downpour as",ch:[["wind","storm"],["wind","gale"],["wind","air"],["wind","breeze"],["wind","tornado"]],ans:1,type:"Degree",tip:"A downpour is an extreme form of rain; a gale is an extreme powerful form of wind."},
{id:77,stem:"Tap is to pound as",ch:[["suggest","advise"],["suggest","hint"],["suggest","demand"],["suggest","request"],["suggest","tell"]],ans:2,type:"Degree",tip:"Pounding is more forceful than tapping; demanding is more forceful than suggesting."},
{id:78,stem:"Annoyed is to furious as",ch:[["thin","skinny"],["thin","slender"],["thin","gaunt"],["thin","weak"],["thin","fragile"]],ans:2,type:"Degree",tip:"Furious is an extreme form of annoyed; gaunt (extremely thin) is an extreme form of thin."},
{id:79,stem:"Fond is to devoted as",ch:[["cool","warm"],["cool","temperature"],["cool","frigid"],["cool","refreshing"],["cool","cold"]],ans:2,type:"Degree",tip:"Devoted is an extreme form of fond; frigid is an extreme form of cool."},
{id:80,stem:"Brave is to courageous as",ch:[["sad","happy"],["smart","intelligent"],["tired","exhausted"],["fast","slow"],["calm","stormy"]],ans:1,type:"Synonym",tip:"Brave and courageous are synonyms. Smart and intelligent are also synonyms."},
{id:81,stem:"Candid is to honest as",ch:[["verbose","brief"],["diligent","lazy"],["vivacious","lively"],["stoic","emotional"],["bold","timid"]],ans:2,type:"Synonym",tip:"Candid and honest are synonyms. Vivacious and lively are synonyms."},
{id:82,stem:"Frugal is to thrifty as",ch:[["angry","joyful"],["brave","cowardly"],["meticulous","careful"],["famous","unknown"],["kind","cruel"]],ans:2,type:"Synonym",tip:"Frugal and thrifty both mean careful with money. Meticulous and careful are synonyms."},
{id:83,stem:"Tenacious is to persistent as",ch:[["loquacious","silent"],["loquacious","quiet"],["loquacious","talkative"],["loquacious","intelligent"],["loquacious","friendly"]],ans:2,type:"Synonym",tip:"Tenacious and persistent both mean determined. Loquacious and talkative both mean talking a great deal."},
{id:84,stem:"Serene is to tranquil as",ch:[["turbulent","peaceful"],["turbulent","stormy"],["turbulent","chaotic"],["turbulent","windy"],["turbulent","unsettled"]],ans:2,type:"Synonym",tip:"Serene and tranquil are synonyms meaning calm. Turbulent and chaotic are synonyms meaning disordered."},
{id:85,stem:"Bold is to audacious as",ch:[["timid","brave"],["timid","courageous"],["timid","shy"],["timid","diffident"],["timid","nervous"]],ans:3,type:"Synonym",tip:"Bold and audacious are synonyms meaning daring. Timid and diffident are synonyms meaning lacking confidence."},
{id:86,stem:"Remorseful is to regretful as",ch:[["jubilant","sorrowful"],["elated","overjoyed"],["angry","calm"],["tired","energized"],["kind","wicked"]],ans:1,type:"Synonym",tip:"Remorseful and regretful both mean feeling sorry. Elated and overjoyed both mean extremely happy."},
{id:87,stem:"Plausible is to credible as",ch:[["incredible","amazing"],["incredible","unbelievable"],["incredible","fantastic"],["incredible","wonderful"],["incredible","possible"]],ans:1,type:"Synonym",tip:"Plausible and credible both mean believable. Incredible and unbelievable both mean hard to believe."},
{id:88,stem:"Coerce is to force as",ch:[["appease","anger"],["persuade","convince"],["demand","request"],["threaten","warn"],["compel","suggest"]],ans:1,type:"Synonym",tip:"Coerce and force are synonyms. Persuade and convince are synonyms."},
{id:89,stem:"Apex is to peak as",ch:[["valley","hill"],["base","bottom"],["summit","crest"],["equator","pole"],["border","boundary"]],ans:2,type:"Synonym",tip:"Apex and peak are synonyms meaning the very top. Summit and crest are also synonyms."},
{id:90,stem:"Gloss is to luster as",ch:[["dullness","brightness"],["surface","texture"],["sheen","shine"],["smooth","rough"],["color","hue"]],ans:2,type:"Synonym",tip:"Gloss and luster are synonyms meaning a shiny surface. Sheen and shine are also synonyms."},
{id:91,stem:"Scour is to search as",ch:[["scrutinize","examine"],["leer","glance"],["absorb","release"],["invigorate","tire"],["grimace","smile"]],ans:0,type:"Synonym",tip:"Scour means to search thoroughly; scrutinize means to examine very carefully."},
{id:92,stem:"Bedevil is to torment as",ch:[["evoke","destroy"],["evoke","elicit"],["evoke","survey"],["evoke","antagonize"],["evoke","burn"]],ans:1,type:"Synonym",tip:"Bedevil and torment are synonyms meaning to cause distress. Evoke and elicit both mean to draw out."},
{id:93,stem:"Avarice is to greed as",ch:[["philanthropy","wealth"],["philanthropy","charity"],["philanthropy","generosity"],["philanthropy","kindness"],["philanthropy","giving"]],ans:2,type:"Synonym",tip:"Avarice and greed both mean extreme desire for wealth. Philanthropy and generosity both mean giving to help others."},
{id:94,stem:"Correlation is to association as",ch:[["integration","separation"],["disturbance","peace"],["connection","link"],["correction","error"],["election","vote"]],ans:2,type:"Synonym",tip:"Correlation and association are synonyms. Connection and link are also synonyms."},
{id:95,stem:"Palatable is to acceptable as",ch:[["invigorating","exhausting"],["tasty","delicious"],["bland","flavorless"],["edible","eatable"],["appealing","attractive"]],ans:1,type:"Synonym",tip:"Palatable means acceptable. Tasty and delicious are synonyms showing a stronger degree."},
{id:96,stem:"Brave is to cowardly as",ch:[["weak","strong"],["generous","miserly"],["bright","shiny"],["tired","sleepy"],["tall","large"]],ans:1,type:"Antonym",tip:"Brave and cowardly are opposites. Generous and miserly are opposites."},
{id:97,stem:"Diligent is to lazy as",ch:[["organized","chaotic"],["patient","quiet"],["helpful","kind"],["smart","clever"],["active","busy"]],ans:0,type:"Antonym",tip:"Diligent and lazy are opposites. Organized and chaotic are opposites."},
{id:98,stem:"Benevolent is to malevolent as",ch:[["serene","calm"],["serene","peaceful"],["serene","beautiful"],["serene","turbulent"],["serene","quiet"]],ans:3,type:"Antonym",tip:"Benevolent (good) and malevolent (evil) are opposites. Serene (calm) and turbulent (chaotic) are opposites."},
{id:99,stem:"Transparent is to opaque as",ch:[["rigid","flexible"],["bright","shiny"],["clear","clean"],["solid","hard"],["dark","gloomy"]],ans:0,type:"Antonym",tip:"Transparent (see-through) and opaque (can't see through) are opposites. Rigid and flexible are opposites."},
{id:100,stem:"Wane is to grow as",ch:[["kindle","spark"],["kindle","fire"],["kindle","extinguish"],["kindle","burn"],["kindle","ignite"]],ans:2,type:"Antonym",tip:"Wane means to decrease; grow is its opposite. Kindle means to start a fire; extinguish means to put it out."},
{id:101,stem:"Timid is to dauntless as",ch:[["frugal","opulent"],["pensive","sad"],["garrulous","loquacious"],["serene","calm"],["brave","bold"]],ans:0,type:"Antonym",tip:"Timid (fearful) and dauntless (fearless) are opposites. Frugal (thrifty) and opulent (extravagant) are opposites."},
{id:102,stem:"Wisdom is to fools as",ch:[["humor","clowns"],["folly","sages"],["jails","criminals"],["knowledge","teachers"],["joy","sorrow"]],ans:1,type:"Antonym",tip:"Fools lack wisdom. Sages (wise people) lack folly — both pairs are opposites."},
{id:103,stem:"Dilate is to contract as",ch:[["expand","grow"],["expand","inflate"],["expand","narrow"],["expand","widen"],["expand","stretch"]],ans:2,type:"Antonym",tip:"Dilate means to widen; contract means to shrink. Expand and narrow are opposites."},
{id:104,stem:"Remorseful is to unrepentant as",ch:[["slender","stout"],["wily","sly"],["miserable","somber"],["aggravated","resentful"],["lithe","flexible"]],ans:0,type:"Antonym",tip:"Remorseful (feeling regret) and unrepentant (no regret) are opposites. Slender and stout are opposites."},
{id:105,stem:"Plausible is to incredible as",ch:[["possible","unlikely"],["critical","admonishing"],["ability","power"],["pleasant","amenable"],["potential","actual"]],ans:0,type:"Antonym",tip:"Plausible (believable) and incredible (unbelievable) are opposites. Possible and unlikely are opposites."},
{id:106,stem:"Collusion is to cooperation as",ch:[["smuggling","importing"],["character","cast"],["surfing","swimming"],["cooking","ordering out"],["enmity","friendship"]],ans:0,type:"Antonym",tip:"Collusion is an illegal, secretive form of cooperation. Smuggling is an illegal form of importing."},
{id:107,stem:"Placid is to turbulent as",ch:[["volatile","stable"],["calm","serene"],["quiet","silent"],["angry","furious"],["tired","exhausted"]],ans:0,type:"Antonym",tip:"Placid (calm) and turbulent (chaotic) are opposites. Volatile (unpredictable) and stable (steady) are opposites."},
{id:108,stem:"Stingy is to generous as",ch:[["reckless","cautious"],["clever","sly"],["happy","cheerful"],["quiet","soft"],["large","huge"]],ans:0,type:"Antonym",tip:"Stingy and generous are opposites. Reckless (careless) and cautious (careful) are opposites."},
{id:109,stem:"Castigate is to praise as",ch:[["berate","commend"],["scold","punish"],["critique","improve"],["judge","decide"],["correct","fix"]],ans:0,type:"Antonym",tip:"Castigate means to harshly criticize — the opposite of praise. Berate means to scold — the opposite of commend."},
{id:110,stem:"Obstinate is to yielding as",ch:[["verbose","brief"],["candid","frank"],["resilient","strong"],["diligent","busy"],["serene","peaceful"]],ans:0,type:"Antonym",tip:"Obstinate (refusing to change) and yielding are opposites. Verbose (too many words) and brief are opposites."},
{id:111,stem:"Credulous is to skeptical as",ch:[["naive","gullible"],["wise","foolish"],["curious","inquisitive"],["trusting","doubtful"],["quick","slow"]],ans:3,type:"Antonym",tip:"Credulous (believing too easily) and skeptical (questioning) are opposites. Trusting and doubtful are opposites."},
{id:112,stem:"Somber is to festive as",ch:[["gloomy","cheerful"],["dark","dim"],["serious","stern"],["quiet","silent"],["sad","unhappy"]],ans:0,type:"Antonym",tip:"Somber and festive are opposites. Gloomy and cheerful are opposites."},
{id:113,stem:"Laconic is to verbose as",ch:[["brief","wordy"],["quiet","loud"],["short","long"],["terse","rambling"],["concise","succinct"]],ans:0,type:"Antonym",tip:"Laconic (very few words) and verbose (too many words) are opposites. Brief and wordy are also opposites."},
{id:114,stem:"Impetuous is to cautious as",ch:[["rash","deliberate"],["bold","brave"],["quick","speedy"],["careful","thorough"],["smart","wise"]],ans:0,type:"Antonym",tip:"Impetuous (acting without thinking) and cautious are opposites. Rash and deliberate are also opposites."},
{id:115,stem:"Mitigate is to worsen as",ch:[["alleviate","intensify"],["remedy","cure"],["reduce","lessen"],["prevent","stop"],["hide","conceal"]],ans:0,type:"Antonym",tip:"Mitigate (reduce harm) and worsen are opposites. Alleviate (ease suffering) and intensify are opposites."},
{id:116,stem:"Practice is to improvement as",ch:[["study","knowledge"],["sleep","energy"],["eat","hunger"],["rest","fatigue"],["work","play"]],ans:0,type:"Cause & Effect",tip:"Practice causes improvement; study causes knowledge."},
{id:117,stem:"Drought is to water as",ch:[["famine","poverty"],["famine","hunger"],["famine","food"],["famine","crops"],["famine","rain"]],ans:2,type:"Cause & Effect",tip:"A drought is a shortage of water; a famine is a shortage of food."},
{id:118,stem:"Insult is to offense as",ch:[["compliment","praise"],["compliment","flattery"],["compliment","gratitude"],["compliment","kindness"],["compliment","happiness"]],ans:2,type:"Cause & Effect",tip:"An insult causes offense; a compliment causes gratitude."},
{id:119,stem:"Mitigate is to harm as",ch:[["irrigate","farm"],["instigate","violence"],["substantiate","claims"],["alleviate","suffering"],["celebrate","joy"]],ans:3,type:"Cause & Effect",tip:"To mitigate is to reduce harm; to alleviate is to reduce suffering."},
{id:120,stem:"Curiosity is to discovery as",ch:[["apathy","failure"],["apathy","boredom"],["apathy","stagnation"],["apathy","confusion"],["apathy","silence"]],ans:2,type:"Cause & Effect",tip:"Curiosity leads to discovery; apathy (lack of interest) leads to stagnation (no growth)."},
{id:121,stem:"Diligence is to success as",ch:[["procrastination","failure"],["talent","practice"],["effort","reward"],["laziness","rest"],["ambition","goal"]],ans:0,type:"Cause & Effect",tip:"Diligence (hard work) causes success; procrastination (constant delay) causes failure."},
{id:122,stem:"Insult is to offense as",ch:[["atone","mistake"],["atone","guilt"],["atone","wrongdoing"],["atone","regret"],["atone","shame"]],ans:2,type:"Cause & Effect",tip:"You atone (make amends) for wrongdoing; an insult leads to offense. Both show cause and response."},
{id:123,stem:"High school is to college as",ch:[["kindergarten","pre-school"],["maturity","youth"],["teenager","school"],["apprenticeship","job"],["urbanite","city"]],ans:3,type:"Sequence",tip:"High school prepares you for college; an apprenticeship prepares you for a job."},
{id:124,stem:"Puppy is to dog as",ch:[["foal","colt"],["foal","pony"],["foal","horse"],["foal","mare"],["foal","stable"]],ans:2,type:"Sequence",tip:"A puppy is a baby dog; a foal is a baby horse."},
{id:125,stem:"Bud is to bloom as",ch:[["caterpillar","butterfly"],["egg","nest"],["plant","flower"],["seed","soil"],["leaf","tree"]],ans:0,type:"Sequence",tip:"A bud grows into a bloom; a caterpillar transforms into a butterfly."},
{id:126,stem:"Apprentice is to master as",ch:[["student","professor"],["child","adult"],["intern","employee"],["rookie","veteran"],["beginner","expert"]],ans:0,type:"Sequence",tip:"An apprentice learns from and eventually becomes a master; a student learns from a professor."},
{id:127,stem:"Dawn is to morning as",ch:[["dusk","night"],["dusk","sunset"],["dusk","evening"],["dusk","dark"],["dusk","twilight"]],ans:2,type:"Sequence",tip:"Dawn is the start of morning; dusk is the start of evening."},
{id:128,stem:"Germinate is to seed as",ch:[["hatch","chick"],["hatch","nest"],["hatch","egg"],["hatch","bird"],["hatch","shell"]],ans:2,type:"Sequence",tip:"To germinate means a seed begins to develop; to hatch means an egg opens and develops."},
{id:129,stem:"Author is to novel as",ch:[["composer","concert"],["composer","orchestra"],["composer","symphony"],["composer","stage"],["composer","musician"]],ans:2,type:"Creator to Creation",tip:"An author creates a novel; a composer creates a symphony."},
{id:130,stem:"Playwright is to drama as",ch:[["novelist","library"],["novelist","story"],["novelist","fiction"],["novelist","character"],["novelist","script"]],ans:2,type:"Creator to Creation",tip:"A playwright writes a drama; a novelist writes fiction."},
{id:131,stem:"Choreographer is to ballet as",ch:[["director","stage"],["director","audience"],["director","film"],["director","money"],["director","actor"]],ans:2,type:"Creator to Creation",tip:"A choreographer creates a ballet; a director creates a film."},
{id:132,stem:"Architect is to building as",ch:[["poet","stanza"],["poet","poem"],["poet","museum"],["poet","rhyme"],["poet","word"]],ans:1,type:"Creator to Creation",tip:"An architect creates a building; a poet creates a poem."},
{id:133,stem:"Carpenter is to cabinet as",ch:[["jeweler","gold"],["jeweler","ring"],["jeweler","necklace"],["jeweler","gem"],["jeweler","craft"]],ans:2,type:"Creator to Creation",tip:"A carpenter creates a cabinet; a jeweler creates a necklace."},
{id:134,stem:"Tallow is to fat as",ch:[["leather","wood"],["leather","tanning"],["leather","wallet"],["leather","skin"],["leather","cow"]],ans:3,type:"Material",tip:"Tallow is a product made from animal fat; leather is a product made from animal skin."},
{id:135,stem:"Cider is to apple as",ch:[["wine","bottle"],["wine","vineyard"],["wine","grape"],["wine","ferment"],["wine","vintage"]],ans:2,type:"Material",tip:"Cider is a drink made from apples; wine is a drink made from grapes."},
{id:136,stem:"Tallow is to fat as",ch:[["glass","sand"],["glass","window"],["glass","break"],["glass","clear"],["glass","bottle"]],ans:0,type:"Material",tip:"Tallow is made from animal fat; glass is made from sand."},
{id:137,stem:"Pound is to weight as",ch:[["mile","foot"],["mile","height"],["mile","distance"],["mile","money"],["mile","speed"]],ans:2,type:"Measurement",tip:"A pound is a unit used to measure weight; a mile is a unit used to measure distance."},
{id:138,stem:"Pound is to weight as",ch:[["inch","foot"],["tall","height"],["mile","distance"],["money","rich"],["arithmetic","school"]],ans:2,type:"Measurement",tip:"A pound is a unit of weight; a mile is a unit of distance. Both measure specific physical quantities."},
{id:139,stem:"Computer is to computerize as",ch:[["motor","engine"],["motor","machine"],["motor","motorize"],["motor","drive"],["motor","electric"]],ans:2,type:"Word Form",tip:"Computerize is the verb form of computer. Motorize is the verb form of motor."},
{id:140,stem:"Wide is to width as",ch:[["long","longer"],["long","length"],["long","tall"],["long","distance"],["long","size"]],ans:1,type:"Word Form",tip:"Width is the noun form of the adjective wide; length is the noun form of the adjective long."},
{id:141,stem:"Navigate is to destination as",ch:[["cheat","success"],["strive","goal"],["contrive","improvise"],["concede","failure"],["maneuver","departure"]],ans:1,type:"Function",tip:"You navigate toward a destination; you strive toward a goal. Both show effort toward an end point."},
{id:142,stem:"Construe is to meaning as",ch:[["navigate","map"],["navigate","ship"],["navigate","destination"],["navigate","ocean"],["navigate","direction"]],ans:2,type:"Function",tip:"To construe is to find and interpret meaning; to navigate is to find your way to a destination."},
{id:143,stem:"Subsidy is to financial aid as",ch:[["grant","scholarship"],["loan","debt"],["tax","burden"],["fee","cost"],["penalty","fine"]],ans:0,type:"Synonym",tip:"A subsidy is a form of financial aid; a grant is a form of scholarship or financial support."},
{id:144,stem:"Omnivore is to plants and meat as",ch:[["herbivore","fish"],["herbivore","anything"],["herbivore","plants"],["herbivore","meat"],["herbivore","berries"]],ans:2,type:"Characteristic",tip:"An omnivore eats both plants and meat; an herbivore eats only plants."},
{id:145,stem:"Latitude is to north-south as",ch:[["longitude","geography"],["longitude","direction"],["longitude","east-west"],["longitude","coordinates"],["longitude","distance"]],ans:2,type:"Characteristic",tip:"Latitude measures position in the north-south direction; longitude measures in the east-west direction."},
{id:146,stem:"Hypothesis is to scientist as",ch:[["blueprint","engineer"],["blueprint","builder"],["blueprint","architect"],["blueprint","designer"],["blueprint","planner"]],ans:2,type:"Tool to User",tip:"A hypothesis is the starting plan of a scientist; a blueprint is the starting plan of an architect."},
{id:147,stem:"Amnesia is to memory as",ch:[["blindness","glasses"],["blindness","sight"],["blindness","vision"],["blindness","darkness"],["blindness","reading"]],ans:2,type:"Characteristic",tip:"Amnesia is the loss of memory; blindness is the loss of vision."},
{id:148,stem:"Stagnant is to flowing as",ch:[["dormant","active"],["still","calm"],["quiet","peaceful"],["slow","sluggish"],["weak","tired"]],ans:0,type:"Antonym",tip:"Stagnant (not moving) and flowing are opposites. Dormant (inactive) and active are opposites."},
{id:149,stem:"Shrewd is to naive as",ch:[["cunning","gullible"],["smart","foolish"],["wise","ignorant"],["clever","slow"],["alert","oblivious"]],ans:0,type:"Antonym",tip:"Shrewd (sharp judgment) and naive (lacking judgment) are opposites. Cunning and gullible are opposites."},
{id:150,stem:"Pacific is to war as",ch:[["abstemious","indulgence"],["abstemious","ocean"],["abstemious","peace"],["abstemious","fasting"],["abstemious","religion"]],ans:0,type:"Antonym",tip:"Pacific means peaceful; war is its opposite. Abstemious means self-restrained — indulgence is its opposite."}

const PASSAGES=[{id:1,title:"The Stubborn Seed",text:"In the middle of a concrete sidewalk, where no reasonable plant would dare to grow, a tiny oak sapling pushed its way toward the sun. Pedestrians stepped around it, mystified. City workers debated removing it. Yet week after week, it remained.\n\nDr. Nina Patel, a botanist who had studied urban plant resilience for twenty years, noticed the sapling on her morning walk. She crouched down and examined it carefully. The crack in the sidewalk was no wider than her thumb, yet somehow the young oak had found enough soil, enough moisture, enough light to survive.\n\n\"Tenacity,\" she murmured, almost to herself. She had observed this quality in plants across three continents — a mangrove that colonized a saltwater shoreline, a wildflower that bloomed on the rim of a volcano. Life, she had concluded, was far more resilient than people imagined.\n\nThe city eventually decided to replace the cracked sidewalk. But at Dr. Patel's insistence, workers carefully transplanted the small oak to a nearby park, where it stands today — a symbol, she says, of stubborn, quiet persistence.",qs:[{q:"As used in the passage, 'tenacity' most nearly means:",ch:["flexibility","stubbornness and persistence","great intelligence","physical strength"],ans:1},{q:"Why did Dr. Patel most likely say 'Tenacity' to herself?",ch:["She was unhappy with the city's plans","She admired the plant's determination to survive","She was identifying the plant's species","She was rehearsing a speech"],ans:1},{q:"The main purpose of this passage is to:",ch:["explain how to transplant trees","describe a scientist's daily routine","illustrate the remarkable persistence of living things","argue that cities should protect sidewalk plants"],ans:2},{q:"Which word best describes Dr. Patel's attitude toward the sapling?",ch:["Indifferent","Amused","Admiring","Concerned"],ans:2}]},{id:2,title:"The Price of Words",text:"In ancient times, before the printing press made books affordable, knowledge was extraordinarily rare and precious. Manuscripts were copied by hand — a task that might take a single monk an entire year for one volume. Libraries were not open to the public; they were guarded rooms in castles and monasteries.\n\nTo own even one book was a sign of great wealth. A single Bible could cost as much as a house. Scholars who wanted to learn often had to travel vast distances, sometimes across continents, just to read a specific text for a few hours.\n\nWhen Johannes Gutenberg invented the movable-type printing press around 1440, he changed civilization. Within fifty years, millions of books existed where once there had been thousands. Ideas that had lived in only a handful of manuscripts could suddenly cross borders and oceans.\n\nSome feared this spread of knowledge. Religious leaders worried that people would read the Bible themselves and form their own interpretations. Rulers worried that political ideas would spread beyond their control. In many cases, these fears proved correct — the printing press played a central role in the Protestant Reformation and helped ignite the Scientific Revolution.\n\nThe written word, it turned out, was more powerful than any sword.",qs:[{q:"The word 'spread' in paragraph 4 most nearly means in context:",ch:["confusion","the sharing of something widely","government control","a printing technique"],ans:1},{q:"Which best states the main idea of this passage?",ch:["Gutenberg was the most important inventor ever","Books were once only for monks and priests","The printing press transformed the spread of knowledge and power","Religious leaders opposed all forms of learning"],ans:2},{q:"According to the passage, what was one reason rulers feared the printing press?",ch:["It was too expensive for common people","Political ideas could spread beyond their control","Books could be used to criticize Gutenberg","Paper was dangerously flammable"],ans:1},{q:"The statement 'The written word was more powerful than any sword' suggests:",ch:["Writers were physically stronger than soldiers","Ideas can change the world more than violence can","Swords were useless in ancient times","Gutenberg was a military leader"],ans:1}]},{id:3,title:"Echo",text:"Maya had always been quiet. Not shy, exactly — she simply preferred to listen. In class, while others competed to speak first, Maya sat back and absorbed everything: the way her teacher's voice slowed near important facts, the moment a classmate's question revealed a misunderstanding, the pause before someone said something they actually meant.\n\nHer mother called it her \"superpower.\" Her teachers wrote words like \"reserved\" and \"thoughtful\" on her report cards. A few classmates mistook her silence for indifference — or worse, for a lack of intelligence.\n\nWhat none of them understood was that Maya was composing. In her mind, she was arranging words, testing them, discarding the ones that weren't quite right. By the time she spoke — which she did, eventually, when she had something worth saying — her sentences were careful and exact.\n\nOn the day of the school debate competition, Maya's opponent was Jordan, who was quick and clever and filled every available silence with confident words. Maya let him speak. She listened. She waited.\n\nThen, in one quiet and precise response, she took apart every single one of his arguments.\n\nThe room went still. Even Jordan was silent. Maya nodded once and sat back down.",qs:[{q:"As used in paragraph 3, 'composing' most nearly means:",ch:["calming herself down","carefully preparing and organizing her thoughts","writing music","responding to emails"],ans:1},{q:"The author suggests that Maya's quietness is primarily:",ch:["a sign that she is unhappy","a misunderstood strength","a strategy she learned from her mother","a problem she is trying to fix"],ans:1},{q:"What does 'Maya let him speak' suggest about her approach?",ch:["She was too nervous to respond","She didn't care about winning", const SK="ssat_prep_v4";

const today=()=>new Date().toISOString().slice(0,10);
const addXP=xp=>{const t=today(),prev=progress.lastDate,yest=new Date();yest.setDate(yest.getDate()-1);const ys=yest.toISOString().slice(0,10);let s=progress.streak;if(prev!==t)s=prev===ys?s+1:1;progress={...progress,xp:progress.xp+xp,streak:s,lastDate:t};saveP(progress)};

// ── ANALOGIES ─────────────────────────────────────────────────
function startAnalogies(){aQueue=[...ANALOGIES].sort(()=>Math.random()-.5);aIdx=0;aChosen=null;aScore={c:0,t:0};go('analogies')}

function renderAnalogy_choice(c, i, ans, chosen){
  const answered = chosen!==null;
  let cls='answer-btn';
  if(answered){if(i===ans)cls+=' correct';else if(i===chosen)cls+=' wrong';}
  const label = c[0]+' is to '+c[1];
  return `<button class="${cls}" ${answered?'disabled':''} onclick="answerAnalogy(${i})"><span class="choice-letter">${LETTERS[i]}</span>${label}</button>`;
}

function renderAnalogies(){
  const q=aQueue[aIdx%aQueue.length],answered=aChosen!==null,correct=aChosen===q.ans;
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h1 style="margin:0;font-size:20px">Analogies</h1>
    <span style="font-size:12px;color:#9ca3af">${aIdx+1} / ${ANALOGIES.length}</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span class="type-chip">${q.type.toUpperCase()}</span>
    <span class="badge" style="background:#fef9c3;color:#854d0e">${aScore.c}/${aScore.t} correct</span>
  </div>
  <div class="analogy-stem">
    <p style="font-size:11px;color:#93c5fd;margin-bottom:8px;font-weight:700;letter-spacing:.5px">SELECT THE BEST ANSWER</p>
    <p class="stem-text">${q.stem} <span class="blank">_____ is to _____</span></p>
  </div>
  ${q.ch.map((c,i)=>renderAnalogy_choice(c,i,q.ans,aChosen)).join('')}
  ${answered?`<div style="background:${correct?'#dcfce7':'#fef9c3'};border-radius:14px;padding:14px;margin-top:6px">
    <p style="font-weight:800;color:${correct?'#166534':'#92400e'};margin-bottom:6px">${correct?'🎉 Correct! +15 XP':'💡 Not quite — here\'s why:'}</p>
    <p style="font-size:13px;color:#374151;margin-bottom:10px">${q.tip}</p>
    <button class="btn btn-primary" onclick="nextAnalogy()">Next Question →</button>
  </div>`:''}`;
}

function answerAnalogy(i){
  if(aChosen!==null)return;aChosen=i;
  const q=aQueue[aIdx%aQueue.length],correct=i===q.ans;
  aScore={c:aScore.c+(correct?1:0),t:aScore.t+1};
  const h=progress.ah[q.id]||{c:0,i:0};
  progress.ah[q.id]={c:h.c+(correct?1:0),i:h.i+(correct?0:1)};
  addXP(correct?15:2);render();
}
function nextAnalogy(){aIdx++;aChosen=null;render();}

    ${answered?`<div style="background:${correct?'#dcfce7':'#fee2e2'};border-radius:14px;padding:14px;margin-top:4px"><p style="font-weight:800;color:${correct?'#166534':'#991b1b'};margin-bottom:6px">${correct?'✓ Correct! +12 XP':'✗ Not quite'}</p>${!correct?`<p style="font-size:13px;color:#374151;margin-bottom:8px">Correct: ${q.ch[q.ans]}</p>`:''}<button class="btn btn-primary" onclick="nextRCQ()">${qIdx+1<PASSAGES[pIdx].qs.length?'Next Question →':'Finish Passage ✓'}</button></div>`:''}`;
  }

  <h2 style="margin-bottom:16px">${p.title}</h2>
  <div class="card" style="line-height:1.8;font-size:14.5px;color:#374151">${p.text.split('\n\n').filter(Boolean).map(pp=>`<p style="margin-bottom:12px">${pp}</p>`).join('')}</div>
  <button class="btn btn-primary" onclick="qMode=true;render()">Answer Questions →</button>`;
}
function answerRC(i){if(qChosen!==null)return;qChosen=i;const q=PASSAGES[pIdx].qs[qIdx],correct=i===q.ans;const h=progress.rh[`${pIdx}-${qIdx}`]||{c:0,i:0};progress.rh[`${pIdx}-${qIdx}`]={c:h.c+(correct?1:0),i:h.i+(correct?0:1)};addXP(correct?12:2);render();}
function nextRCQ(){if(qIdx+1>=PASSAGES[pIdx].qs.length)pDone=true;else{qIdx++;qChosen=null;}render();}
function nextPassage(){pIdx++;qMode=false;qIdx=0;qChosen=null;pDone=false;render();}

  <div style="margin-bottom:6px;font-size:13px;font-weight:700;color:#374151">Root (optional)</div><input class="input-field" placeholder="e.g. epher- (lasting a day)" value="${f.root}" oninput="addForm.root=this.value">

  :customWords.length===0?`<div style="text-align:center;padding:40px 20px"><div style="font-size:48px">📝</div><p class="muted" style="margin-top:12px">No custom words yet. Add words from school, books, or practice tests!</p></div>`

  <button class="btn btn-secondary" style="margin-top:8px" onclick="if(confirm('Delete all custom words?')){customWords=[];saveC(customWords);render()}">Delete All Custom Words</button>`}`;
}
function submitWord(){addErr="";const{w,d,ex,pos,root}=addForm;if(!w.trim()){addErr="Please enter a word.";render();return;}if(!d.trim()){addErr="Please enter a definition.";render();return;}if(!ex.trim()){addErr="Please enter an example sentence.";render();return;}if(allVocab().find(v=>v.w.toLowerCase()===w.trim().toLowerCase())){addErr=`"${w.trim()}" is already in your word bank!`;render();return;}customWords.push({id:`c_${Date.now()}`,w:w.trim(),d:d.trim(),ex:ex.trim(),pos:pos||'adj',root:root.trim()||null,lvl:2,custom:true});saveC(customWords);addForm={w:"",d:"",ex:"",pos:"adj",root:""};addErr="";addTab="list";render();}
function deleteWord(i){if(!confirm(`Delete "${customWords[i].w}"?`))return;const id=customWords[i].id;customWords.splice(i,1);saveC(customWords);if(progress.vh[id])delete progress.vh[id];saveP(progress);render();}

// ── PROGRESS ──────────────────────────────────────────────────
function renderProgress(){
  const vh=Object.values(progress.vh),tV=vh.reduce((s,h)=>s+h.c+h.i,0),cV=vh.reduce((s,h)=>s+h.c,0),aV=tV>0?Math.round(cV/tV*100):0;
  const ah=Object.values(progress.ah),tA=ah.reduce((s,h)=>s+h.c+h.i,0),cA=ah.reduce((s,h)=>s+h.c,0),aA=tA>0?Math.round(cA/tA*100):0;
  const rh=Object.values(progress.rh),tR=rh.reduce((s,h)=>s+h.c+h.i,0),cR=rh.reduce((s,h)=>s+h.c,0),aR=tR>0?Math.round(cR/tR*100):0;
  const bar=(label,c,t)=>{const pct=t>0?Math.round(c/t*100):0,col=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#374151">${label}</span><span class="muted">${c}/${t} (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div></div>`;};
  const all=allVocab();
  const hardest=all.filter(w=>progress.vh[w.id]&&progress.vh[w.id].i>0).map(w=>({...w,...progress.vh[w.id]})).sort((a,b)=>(b.i/(b.c+b.i))-(a.i/(a.c+a.i))).slice(0,5);
  const typeStats={};ANALOGIES.forEach(q=>{const h=progress.ah[q.id];if(!h)return;if(!typeStats[q.type])typeStats[q.type]={c:0,t:0};typeStats[q.type].c+=h.c;typeStats[q.type].t+=h.c+h.i;});
  const empty=tV===0&&tA===0&&tR===0;
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h1 style="margin:0">My Progress</h1><button onclick="go('parentdash')" style="background:#0f2545;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">Parent View</button></div>
  <div class="stat-grid"><div class="stat-box"><div style="font-size:18px">📖</div><div class="stat-val" style="font-size:20px;color:#3b82f6">${aV}%</div><div class="stat-lbl">Vocab</div></div><div class="stat-box"><div style="font-size:18px">🔗</div><div class="stat-val" style="font-size:20px;color:#8b5cf6">${aA}%</div><div class="stat-lbl">Analogies</div></div><div class="stat-box"><div style="font-size:18px">📜</div><div class="stat-val" style="font-size:20px;color:#10b981">${aR}%</div><div class="stat-lbl">Reading</div></div></div>
  ${empty?`<div style="text-align:center;padding:40px"><div style="font-size:48px">🌱</div><p class="muted" style="margin-top:12px">Start practicing to see your progress here!</p></div>`:`
  <div class="card"><h2 style="font-size:14px;margin-bottom:14px">Section Performance</h2>${bar('Vocabulary',cV,tV)}${bar('Analogies',cA,tA)}${bar('Reading Comprehension',cR,tR)}</div>
  ${Object.keys(typeStats).length>0?`<div class="card"><h2 style="font-size:14px;margin-bottom:14px">Analogy Types — Where to Focus</h2>${Object.entries(typeStats).sort((a,b)=>(b[1].t>0?b[1].c/b[1].t:0)-(a[1].t>0?a[1].c/a[1].t:0)).map(([t,s])=>bar(t,s.c,s.t)).join('')}</div>`:''}
  ${hardest.length>0?`<div class="card" style="border:2px solid #fed7aa;background:#fff8f0"><h2 style="font-size:14px;color:#c2410c;margin-bottom:12px">⚠️ Focus Words — Needs More Practice</h2>${hardest.map(w=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fed7aa"><div><span style="font-weight:700;color:#374151">${w.w}</span>${w.custom?'<span class="badge" style="background:#fce7f3;color:#9d174d;margin-left:6px;font-size:10px">MY WORD</span>':''}<span class="muted" style="font-size:12px;margin-left:8px;display:block">${w.d.substring(0,40)}...</span></div><span style="font-size:12px;color:#dc2626;font-weight:800;flex-shrink:0">${Math.round(w.i/(w.c+w.i)*100)}% miss</span></div>`).join('')}</div>`:''}
  <button class="btn btn-secondary" style="margin-top:8px" onclick="if(confirm('Reset all progress? This cannot be undone.')){progress=mkP();saveP(progress);render()}">Reset Progress</button>`}`;
}

// ── PARENT DASHBOARD ─────────────────────────────────────────
function renderParentDash(){
  const all=allVocab();

  // Analogy type stats
  const typeStats={};
  ANALOGIES.forEach(q=>{
    const h=progress.ah[q.id];
    if(!h||(h.c+h.i===0)) return;
    if(!typeStats[q.type]) typeStats[q.type]={c:0,t:0,examples:[]};
    typeStats[q.type].c+=h.c;
    typeStats[q.type].t+=h.c+h.i;
    if(h.i>0) typeStats[q.type].examples.push(q.stem);
  });
  const typeArr=Object.entries(typeStats)
    .map(([t,s])=>({type:t,c:s.c,t:s.t,acc:Math.round(s.c/s.t*100),examples:s.examples}))
    .sort((a,b)=>a.acc-b.acc);
  const weakTypes=typeArr.filter(x=>x.acc<70);

  // Vocab stats by level and root
  const lvlStats={1:{c:0,i:0},2:{c:0,i:0},3:{c:0,i:0}};
  const rootMiss={};
  const missedWords=[];
  all.forEach(w=>{
    const h=progress.vh[w.id];
    if(!h||(h.c+h.i===0)) return;
    const lv=w.lvl||2;
    lvlStats[lv].c+=h.c; lvlStats[lv].i+=h.i;
    if(h.i>0){
      missedWords.push({...w,...h,rate:Math.round(h.i/(h.c+h.i)*100)});
      if(w.root){
        const rk=w.root.split('(')[0].trim();
        if(!rootMiss[rk]) rootMiss[rk]={words:[],i:0};
        rootMiss[rk].words.push(w.w); rootMiss[rk].i+=h.i;
      }
    }
  });
  missedWords.sort((a,b)=>b.rate-a.rate);
  const topMiss=missedWords.slice(0,8);
  const rootArr=Object.entries(rootMiss).sort((a,b)=>b[1].i-a[1].i).slice(0,5);

  // Reading stats
  const rhVals=Object.values(progress.rh);
  const rTotal=rhVals.reduce((s,h)=>s+h.c+h.i,0);
  const rCorr=rhVals.reduce((s,h)=>s+h.c,0);
  const rAcc=rTotal>0?Math.round(rCorr/rTotal*100):null;

  // Analogy + vocab overall
  const ahVals=Object.values(progress.ah);
  const aTotal=ahVals.reduce((s,h)=>s+h.c+h.i,0);
  const aCorr=ahVals.reduce((s,h)=>s+h.c,0);
  const aAcc=aTotal>0?Math.round(aCorr/aTotal*100):null;
  const vhVals=Object.values(progress.vh);
  const vTotal=vhVals.reduce((s,h)=>s+h.c+h.i,0);
  const vCorr=vhVals.reduce((s,h)=>s+h.c,0);
  const vAcc=vTotal>0?Math.round(vCorr/vTotal*100):null;

  const noData=vTotal===0&&aTotal===0&&rTotal===0;
  if(noData) return `<button style="background:none;border:none;color:#6b7280;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:14px" onclick="go('progress')">← Back</button>
    <h1 style="margin-bottom:6px">Parent Dashboard</h1>
    <div style="text-align:center;padding:40px 0"><div style="font-size:52px">🌱</div>
    <p style="font-weight:700;color:#374151;margin-top:14px">No data yet!</p>
    <p class="muted" style="margin-top:6px">Have her complete some practice sessions first, then come back here.</p></div>`;

  // Build focus recommendations
  const recs=[];
  if(weakTypes.length>0){
    const worst=weakTypes[0];
    recs.push({icon:"🔗",color:"#fef9c3",border:"#fde68a",text:"#78350f",
      title:`Weakest analogy type: "${worst.type}" (${worst.acc}%)`,
      detail:`She's getting ${100-worst.acc}% wrong on ${worst.type} analogies after ${worst.t} attempts. Strategy: before choosing, say the relationship out loud — e.g. "A is a type of B." Example she missed: "${worst.examples[0]||''}"`});
  }
  if(weakTypes.length>1){
    const second=weakTypes[1];
    recs.push({icon:"🔗",color:"#fff7ed",border:"#fed7aa",text:"#92400e",
      title:`Second weakest: "${second.type}" (${second.acc}%)`,
      detail:`${second.type} analogies are also a problem area. Practice identifying this relationship type specifically.`});
  }
  if(topMiss.length>0){
    recs.push({icon:"📖",color:"#fee2e2",border:"#fca5a5",text:"#991b1b",
      title:"High-miss vocabulary words",
      detail:`These words keep coming up wrong: ${topMiss.slice(0,4).map(w=>w.w+' ('+w.rate+'% miss rate)').join(', ')}. Try: say the definition, then use the word in a new sentence out loud.`});
  }
  if(rootArr.length>0){
    recs.push({icon:"🌿",color:"#dcfce7",border:"#6ee7b7",text:"#065f46",
      title:`Root word gap: "${rootArr[0][0]}"`,
      detail:`Words sharing the "${rootArr[0][0]}" root keep getting missed: ${rootArr[0][1].words.join(', ')}. Spend 10 minutes on that root in the Root Words section — one root unlocks many words at once.`});
  }
  const l3=lvlStats[3], l3total=l3.c+l3.i;
  if(l3total>3 && l3.i/l3total>0.4){
    recs.push({icon:"🎯",color:"#ede9fe",border:"#c4b5fd",text:"#5b21b6",
      title:"Level 3 (hardest) words need more time",
      detail:`She's missing ${Math.round(l3.i/l3total*100)}% of the hardest vocabulary. Try reviewing Level 3 words in separate short sessions rather than mixed with easier ones.`});
  }
  if(rAcc!==null&&rAcc<65){
    recs.push({icon:"📜",color:"#dbeafe",border:"#93c5fd",text:"#1e40af",
      title:`Reading comprehension at ${rAcc}% — needs attention`,
      detail:"Tip: On the real SSAT, passages are open-book — train her to go back to the passage and find the exact line before answering, rather than answering from memory."});
  }
  if(recs.length===0){
    recs.push({icon:"⭐",color:"#dcfce7",border:"#6ee7b7",text:"#065f46",
      title:"Great all-round performance!",
      detail:"No major weak spots detected. Keep up the daily practice — consistency is the key to SSAT success."});
  }

  const bar=(label,c,t)=>{const pct=t>0?Math.round(c/t*100):0;const col=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';
    return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#374151">'+label+'</span><span style="font-size:12px;color:#6b7280">'+c+'/'+t+' correct &nbsp;·&nbsp; '+pct+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';};

  const daysLeft=Math.max(0,Math.round((new Date('2026-10-01')-new Date())/864e5));
  const weeksLeft=Math.max(0,Math.round(daysLeft/7));

  return `<button style="background:none;border:none;color:#6b7280;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:14px" onclick="go('progress')">← Back to Progress</button>
  <h1 style="margin-bottom:2px">👩‍👧 Parent Dashboard</h1>
  <p class="muted" style="margin-bottom:18px">${daysLeft} days · ${weeksLeft} weeks until October 2026</p>

  <div style="display:flex;gap:8px;margin-bottom:18px">
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#3b82f6">${vAcc!==null?vAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Vocab</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#8b5cf6">${aAcc!==null?aAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Analogies</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#10b981">${rAcc!==null?rAcc+'%':'—'}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Reading</div></div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="font-size:20px;font-weight:900;color:#f59e0b">${progress.streak}</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Streak 🔥</div></div>
  </div>

  <div class="card" style="border:2px solid #fde68a;background:#fffbeb;margin-bottom:14px">
    <h2 style="font-size:14px;color:#78350f;margin-bottom:12px">🎯 Where to Focus This Week</h2>
    ${recs.map((r,i)=>`<div style="background:${r.color};border:1.5px solid ${r.border};border-radius:12px;padding:13px;margin-bottom:${i<recs.length-1?'8px':'0'}"><div style="font-weight:800;font-size:13px;color:${r.text};margin-bottom:5px">${r.icon} ${r.title}</div><div style="font-size:12px;color:${r.text};opacity:.85;line-height:1.6">${r.detail}</div></div>`).join('')}
  </div>

  ${aTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">🔗 Analogy Accuracy by Type</h2>
    ${typeArr.map(x=>bar(x.type+' <span style="font-size:10px;font-weight:400;color:#9ca3af">('+x.t+' answered)</span>',x.c,x.t)).join('')}
    ${weakTypes.length>0?`<div style="background:#fff7ed;border-radius:10px;padding:10px 12px;margin-top:4px"><p style="font-size:11px;font-weight:800;color:#c2410c;margin-bottom:5px">Questions she missed in weak types:</p>${weakTypes.slice(0,3).map(x=>`<p style="font-size:11px;color:#92400e;margin-bottom:3px">• <strong>${x.type}:</strong> "${x.examples.slice(0,2).join('" · "')}"</p>`).join('')}</div>`:''}
  </div>`:''}

  ${vTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">📖 Vocabulary — Accuracy by Difficulty</h2>
    ${[1,2,3].map(l=>{const s=lvlStats[l],t=s.c+s.i;return t>0?bar(['Level 1 — Easier','Level 2 — Medium','Level 3 — Hardest'][l-1],s.c,t):'';}).join('')}
    ${topMiss.length>0?`<div style="margin-top:14px"><p style="font-size:12px;font-weight:800;color:#374151;margin-bottom:8px">Most-missed words (highest miss rate first):</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${topMiss.map(w=>`<div style="background:#f9fafb;border-radius:8px;padding:8px 10px"><div style="font-weight:800;font-size:13px;color:#0f2545">${w.w}</div><div style="font-size:10px;color:#9ca3af">${w.d.substring(0,30)}...</div><div style="font-size:12px;font-weight:800;color:${w.rate>=60?'#dc2626':'#d97706'};margin-top:2px">${w.rate}% miss rate</div></div>`).join('')}
      </div></div>`:''}
    ${rootArr.length>0?`<div style="background:#f0fdf4;border-radius:10px;padding:10px 12px;margin-top:12px">
      <p style="font-size:12px;font-weight:800;color:#166534;margin-bottom:6px">🌿 Root word patterns in missed words:</p>
      ${rootArr.map(([root,data])=>`<p style="font-size:12px;color:#15803d;margin-bottom:3px">• <strong>${root}</strong> — missed in: ${data.words.join(', ')}</p>`).join('')}
      <p style="font-size:11px;color:#6b7280;margin-top:6px">Reviewing one root in the Root Words section unlocks multiple words at once.</p>
    </div>`:''}
  </div>`:''}

  ${rTotal>0?`<div class="card" style="margin-bottom:14px">
    <h2 style="font-size:14px;margin-bottom:14px">📜 Reading — Accuracy by Passage</h2>
    ${[0,1,2].map(pi=>{
      const pqs=Object.entries(progress.rh).filter(([k])=>k.startsWith(pi+'-'));
      if(!pqs.length) return '';
      const pc=pqs.reduce((s,[,h])=>s+h.c,0),pt=pqs.reduce((s,[,h])=>s+h.c+h.i,0);
      return bar(['The Stubborn Seed','The Price of Words','Echo'][pi],pc,pt);
    }).join('')}
    ${rAcc!==null&&rAcc<70?`<div style="background:#eff6ff;border-radius:10px;padding:10px 12px;margin-top:6px"><p style="font-size:12px;color:#1e40af;line-height:1.5">💡 <strong>SSAT tip:</strong> Reading passages are open-book on the real test. Train her to find the exact sentence in the passage before choosing an answer — never answer from memory alone.</p></div>`:''}
  </div>`:''}

  <div class="card" style="background:#0f2545;color:#fff;margin-bottom:14px">
    <h2 style="font-size:14px;color:#93c5fd;margin-bottom:12px">📅 Suggested Weekly Schedule</h2>
    ${[{day:"Mon & Thu",task:"Daily Vocabulary (5 words)",color:"#3b82f6"},{day:"Tue & Fri",task:"Analogies (10–15 questions)",color:"#8b5cf6"},{day:"Wednesday",task:"Root Words (2 roots + quiz)",color:"#10b981"},{day:"Saturday",task:"Full reading passage + questions",color:"#f59e0b"},{day:"Sunday",task:"Review missed words from the week",color:"#ef4444"}].map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)"><span style="width:80px;font-size:11px;font-weight:800;color:${d.color};flex-shrink:0">${d.day}</span><span style="font-size:13px;color:#e5e7eb">${d.task}</span></div>`).join('')}
    <p style="font-size:11px;color:#6b7280;margin-top:10px">${weeksLeft} weeks of practice remaining before October 2026</p>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────
const NAV=[{id:'home',e:'🏠',l:'Home'},{id:'vocab',e:'📖',l:'Vocab'},{id:'roots',e:'🌿',l:'Roots'},{id:'analogies',e:'🔗',l:'Analogy'},{id:'reading',e:'📜',l:'Reading'},{id:'progress',e:'📊',l:'Progress'}];
const screens={home:renderHome,vocab:renderVocab,roots:renderRoots,analogies:renderAnalogies,reading:renderReading,addword:renderAddWord,progress:renderProgress,parentdash:renderParentDash};
function render(){const html=screens[view]?screens[view]():'';document.getElementById('app').innerHTML=`<div class="screen">${html}</div><nav class="nav">${NAV.map(n=>`<button class="nav-btn${view===n.id?' active':''}" onclick="go('${n.id}')"><span class="ni">${n.e}</span><span>${n.l}</span></button>`).join('')}</nav>`}
render();
</script>
</body>
